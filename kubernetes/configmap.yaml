---
# ── Application ConfigMap ────────────────────────────────────────────────────────
apiVersion: v1
kind: ConfigMap
metadata:
  name: techfest-config
  namespace: techfest
data:
  NODE_ENV: "production"
  PORT: "5000"
  LOG_LEVEL: "info"
  APP_VERSION: "1.0.0"
  CORS_ORIGIN: "https://techfest.yourdomain.com"
  RATE_LIMIT_WINDOW_MS: "900000"
  RATE_LIMIT_MAX: "200"
  JWT_EXPIRES_IN: "7d"
